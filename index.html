<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Standalone Video Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Toolbar -->
        <header class="toolbar">
            <div class="brand">
                <i data-lucide="monitor" class="brand-icon"></i>
                <span id="txt-brand">LUMINA Standalone</span>
            </div>
            <div class="project-actions">
                <div class="lang-selector">
                    <select id="langSelect" class="num-input">
                        <option value="en">English</option>
                        <option value="bn">Bengali</option>
                        <option value="hi">Hindi</option>
                        <option value="es">Spanish</option>
                        <option value="ar">Arabic</option>
                        <option value="fr">French</option>
                        <option value="ru">Russian</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese</option>
                        <option value="pt">Portuguese</option>
                    </select>
                </div>
                <div class="divider"></div>
                <button class="btn secondary" title="Undo"><i data-lucide="undo-2"></i></button>
                <button class="btn secondary" title="Redo"><i data-lucide="redo-2"></i></button>
                <div class="divider"></div>
                <button class="btn primary" id="exportBtn"><i data-lucide="download"></i> <span id="txt-render">Render MP4</span></button>
            </div>
        </header>

        <div class="main-workspace">
            <!-- Asset Browser -->
            <aside class="asset-browser">
                <div class="sidebar-header">
                    <h3 id="txt-media-pool">Media Pool</h3>
                    <div class="flex-actions">
                        <button class="btn-icon" id="addMediaBtn" title="Local Upload" onclick="document.getElementById('mediaUpload').click()">
                            <i data-lucide="plus"></i>
                        </button>
                        <button class="btn-icon" id="cloudUploadBtn" title="Cloudinary Sync" onclick="document.getElementById('videoUpload').click()">
                            <i data-lucide="cloud-upload"></i>
                        </button>
                    </div>
                    <input type="file" id="mediaUpload" hidden accept="video/*,image/*">
                    <input type="file" id="videoUpload" hidden accept="video/*">
                </div>
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="assetSearch" placeholder="Search assets...">
                </div>
                <div class="media-grid" id="mediaPool">
                    <!-- Dynamic Assets -->
                </div>
            </aside>

            <!-- Preview Viewport -->
            <section class="viewport">
                <div class="preview-container" id="previewContainer">
                    <video id="player" poster="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=1280" controls></video>
                    <div class="playback-controls">
                        <button class="btn-ctrl" id="rewindBtn"><i data-lucide="rewind"></i></button>
                        <button class="btn-play" id="playPauseBtn"><i data-lucide="play"></i></button>
                        <button class="btn-ctrl" id="forwardBtn"><i data-lucide="fast-forward"></i></button>
                    </div>
                </div>
                <div class="time-readout">
                    <span id="currentTime">00:00:00</span>
                    <span class="sep">/</span>
                    <span id="totalTime">00:00:00</span>
                </div>
            </section>

            <!-- Node Inspector -->
            <aside class="inspector">
                <div class="sidebar-header">
                    <h3 id="txt-inspector">Node Inspector</h3>
                    <i data-lucide="settings"></i>
                </div>
                <div class="inspector-tabs">
                    <button class="tab-btn active" id="tab-transform" onclick="switchTab('transform')">Transform</button>
                    <button class="tab-btn" id="tab-cloud" onclick="switchTab('filters')">Cloud Node</button>
                </div>
                
                <div id="transformTab" class="property-stack active">
                    <div class="property-group">
                        <label id="lbl-opacity">Opacity</label>
                        <input type="range" id="opacitySlider" min="0" max="100" value="100">
                    </div>
                    <div class="property-group">
                        <label id="lbl-scale">Scale</label>
                        <input type="range" id="scaleSlider" min="10" max="200" value="100">
                    </div>
                    <div class="property-group">
                        <label id="lbl-start">Start Offset (s)</label>
                        <input type="number" id="startTime" value="3" min="0" class="num-input">
                    </div>
                    <div class="property-group">
                        <label id="lbl-end">End Offset (s)</label>
                        <input type="number" id="endTime" value="15" min="0" class="num-input">
                    </div>
                    <button class="btn primary" id="btn-apply-trim" onclick="trimVideo()" style="margin-top: 10px; width: 100%;">Apply Local Trim</button>
                </div>

                <div id="filtersTab" class="property-stack">
                    <div class="property-group">
                        <label id="lbl-cloud-trans">Cloud Transformation</label>
                        <select id="cloudTransformPreset">
                            <option value="so_3,eo_15,q_auto,f_mp4">Trim (3s-15s) + Auto Quality</option>
                            <option value="w_1280,h_720,c_fill,q_auto">720p HD Smart Fill</option>
                            <option value="e_grayscale">Grayscale Node</option>
                        </select>
                    </div>
                    <div class="property-group">
                        <label id="lbl-params">Parameters</label>
                        <div class="p-4 bg-black/40 rounded-xl border border-white/5 font-mono text-[9px] text-indigo-400 break-all">
                            /video/upload/so_3,eo_15,q_auto,f_mp4/...
                        </div>
                    </div>
                    <button class="btn primary" id="cloudUploadAction" onclick="uploadVideo()" style="margin-top: 10px; width: 100%;">
                        <i data-lucide="zap"></i> <span id="txt-sync">Sync & Transform</span>
                    </button>
                </div>

                <div class="audio-mixer">
                    <div class="mixer-header">
                        <i data-lucide="volume-2"></i>
                        <span id="txt-master">Master Output</span>
                    </div>
                    <div class="vu-meter">
                        <div class="vu-fill" id="vuFill" style="height: 0%"></div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Timeline -->
        <footer class="timeline-container">
            <div class="timeline-toolbar">
                <div class="timeline-tools">
                    <button class="btn-tool active"><i data-lucide="mouse-pointer-2"></i></button>
                    <button class="btn-tool"><i data-lucide="scissors"></i></button>
                    <button class="btn-tool"><i data-lucide="type"></i></button>
                </div>
                <div class="timeline-zoom">
                    <i data-lucide="zoom-out"></i>
                    <input type="range" min="1" max="10" value="5">
                    <i data-lucide="zoom-in"></i>
                </div>
            </div>
            <div class="timeline-ruler">
                <div class="playhead" id="playhead"></div>
            </div>
            <div class="track-area" id="trackArea">
                <div class="track v-track">
                    <div class="track-info">VIDEO 1</div>
                    <div class="track-lane" id="videoLane">
                        <div class="clip" id="mainClip" style="left: 0%; width: 50%">Imported_Asset.mp4</div>
                    </div>
                </div>
                <div class="track a-track">
                    <div class="track-info">AUDIO 1</div>
                    <div class="track-lane">
                        <div class="clip audio" style="left: 0%; width: 100%">Master_Audio.wav</div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
